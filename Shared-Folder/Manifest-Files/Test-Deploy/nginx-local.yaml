---
# 1. NGINX DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-local-deploy
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-local-deploy
  template:
    metadata:
      labels:
        app: nginx-local-deploy
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
# 2. NGINX SERVICE
apiVersion: v1
kind: Service
metadata:
  name: nginx-local-svc
  namespace: default
spec:
  selector:
    app: nginx-local-deploy
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
# 3. Ingress (access via ingress.nginx.local)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-local-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
  - host: ingress.nginx.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-local-svc
            port:
              number: 80
---
# 4. IngressRoute (access via ingressroute.nginx.local)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nginx-local-ingressroute
  namespace: default
spec:
  entryPoints:
    - web
    - websecure
  routes:
  - match: Host(`ingressroute.nginx.local`)
    kind: Rule
    services:
    - name: nginx-local-svc
      port: 80
---
# 5. HTTPRoute (Gateway API, access via httproute.nginx.local)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-local-httproute
  namespace: default
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - "httproute.nginx.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: nginx-local-svc
      port: 80