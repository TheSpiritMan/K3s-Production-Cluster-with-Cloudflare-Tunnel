---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-shared
  namespace: cloudflared
spec:
  selector:
    matchLabels:
      app: cloudflared-shared
  replicas: 1
  template:
    metadata:
      labels:
        app: cloudflared-shared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - run
          resources:
            limits:
              memory: "128Mi"
              cpu: "250m"
            requests:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            failureThreshold: 1
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
      volumes:
        - name: creds
          secret:
            secretName: k3s-cloudflared-tunnel-credential
        - name: config
          configMap:
            name: cloudflared-shared
            items:
              - key: config.yaml
                path: config.yaml